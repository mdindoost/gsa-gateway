resources:
  academic:
    - title: "NJIT Library"
      description: "Research databases, academic journals, study spaces, open access resources, Zotero workshops, and research publishing guidance."
      url: "https://library.njit.edu"
    - title: "NJIT Library Events & Workshops"
      description: "Open Access Week (October), Zotero citation workshops, research support sessions, and academic calendar."
      url: "https://njit.libcal.com"
    - title: "Graduate Studies Office"
      description: "Graduate enrollment, degree requirements, academic policies, student status verification, and thesis/dissertation support."
      url: "https://graduatestudies.njit.edu"
    - title: "Academic Integrity Policy"
      description: "NJIT's full academic integrity guidelines — essential reading for all graduate students."
      url: "https://www.njit.edu/dos/academic-integrity"

  funding:
    - title: "GSA Travel Awards"
      description: "Funding to help graduate students travel to academic conferences to present their research. Apply through GSA at Campus Center 110A or gsa-vpa@njit.edu."
      url: "https://drive.google.com/file/d/1liZupKuojwcUgzsggquF9E67kOIiti6f/view"
    - title: "3MRP Competition Awards"
      description: "$3,000 in prizes for the Three Minute Research Presentations competition, plus travel awards. Annual event each April."
      url: "https://www.gsanjit.com/3mrp"
    - title: "Graduate Research Day Awards"
      description: "$3,000 in travel awards for Graduate Research Day poster presentations held each November. Contact gsa-vpa@njit.edu."
      url: "https://njit.campuslabs.com/engage/organization/gsa"
    - title: "DepRep Department Funding"
      description: "Up to $1,000 per academic year for departmental engagement activities. Submit a one-paragraph proposal to gsa-pres@njit.edu."
      url: "https://njit.campuslabs.com/engage/organization/gsa"

  wellness:
    - title: "NJIT Counseling Center (C-CAPS)"
      description: "Free confidential counseling, mental health workshops, crisis support, and referrals. Campus Center Room 260. After-hours crisis: 973-596-3414."
      url: "https://www.njit.edu/counseling"
    - title: "Center for Peer Wellness Coaching"
      description: "Free, private peer wellness coaching sessions behind NJIT Smashburger. Tues 10:30AM-2:30PM, Wed 11:30AM-1PM and 2:30-5PM, Thurs 10:30-11:30AM. No appointment needed."
      url: "https://www.njit.edu/counseling"
    - title: "NJ Mental Health Ambassadors"
      description: "Student mental health advocacy and peer support network. Community resources and wellness programs."
      url: "https://www.njmhambassadors.org"

  international:
    - title: "Office of Global Initiatives (OGI)"
      description: "International student orientation, programming, visa support, global partnerships, and study abroad opportunities."
      url: "https://www.njit.edu/global"
    - title: "Hanyang University Exchange Program"
      description: "Study abroad exchange with Hanyang University in Seoul, Korea. International Summer and Winter School. Open to sophomores and above including international students."
      url: "https://www.njit.edu/global"
    - title: "International Student Meet & Greet"
      description: "Semester welcome event for new and returning international students. Free food, networking, hosted by OGI and GSA."
      url: "https://njit.campuslabs.com/engage/organization/gsa"
    - title: "Sprintax Tax Preparation"
      description: "NJIT-provided tax software for international students filing U.S. tax returns."
      url: "https://www.sprintax.com"

  research:
    - title: "3MRP - Three Minute Research Presentations"
      description: "Annual competition: present your research in 3 minutes with one slide. $3,000 in awards. Apply at gsanjit.com/3mrp."
      url: "https://www.gsanjit.com/3mrp"
    - title: "Graduate Research Day"
      description: "Annual digital poster presentation event with $3,000 in travel awards. Held every November. Contact gsa-vpa@njit.edu."
      url: "https://njit.campuslabs.com/engage/organization/gsa"
    - title: "MMI Workshop (Multimedia Intelligence)"
      description: "NJIT Workshop on Multimedia Intelligence — research workshop in AI and multimedia. MMI 2026: May 21-22, 2026."
      url: "https://www.gsanjit.com/mmi2026"
    - title: "GSA AI Webinar Series"
      description: "Recurring webinars featuring industry and academic AI/tech speakers. Free for NJIT students. Follow @njit.gsa on Instagram for dates."
      url: "https://www.instagram.com/njit.gsa/"

  governance:
    - title: "GSA Constitution and Bylaws"
      description: "Official governing document of the Graduate Student Association at NJIT."
      url: "https://www.gsanjit.com/_files/ugd/39f179_0fb67e3663c24feb80810718206ef32a.pdf"
    - title: "Club Finance Bylaws"
      description: "Financial rules and procedures for Recognized Graduate Organizations (RGOs) funded by GSA."
      url: "https://www.gsanjit.com/_files/ugd/39f179_5c6faba6de5f4974aac9cfcd826c1889.pdf"
    - title: "Petty Cash / Reimbursement Form"
      description: "For small GSA-related purchases and reimbursements."
      url: "https://www.gsanjit.com/_files/ugd/39f179_20771564def14e99981f6ba279ba84d4.pdf"
    - title: "Public GSA Google Drive"
      description: "Public documents, forms, minutes, and resources from GSA."
      url: "https://drive.google.com/drive/folders/1FokHDUAGToOi3E8ayaqTNSWe_nWvz9-C"
    - title: "Highlander Hub — GSA Page"
      description: "Official GSA page on NJIT's student organization platform. Event registration, club funding, and forms."
      url: "https://njit.campuslabs.com/engage/organization/gsa"
    - title: "Chromeriver Expense Reporting"
      description: "NJIT's system for expense reporting and reimbursements."
      url: "https://www.njit.edu/finance/chrome-river"

  campus_life:
    - title: "GSA Instagram (@njit.gsa)"
      description: "Follow for real-time event announcements, updates, and community news from the Graduate Student Association."
      url: "https://www.instagram.com/njit.gsa/"
    - title: "Highlander Hub — Student Organizations"
      description: "Platform for all NJIT student organizations, event registration, club management, and forms."
      url: "https://njit.campuslabs.com/engage"
    - title: "GSA Website (gsanjit.com)"
      description: "Official GSA website with events, documents, officer information, and research programs."
      url: "https://www.gsanjit.com"
    - title: "PervazivAI Cortex (Student Perk)"
      description: "GSA partner offering 2 months free membership for NJIT students. AI coding and research tools."
      url: "https://www.gsanjit.com"
