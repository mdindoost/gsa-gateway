- id: mc_007
  title: "The Mathematician They Called a Nurse"
  category: history
  subcategory: data visualization
  day_preference: thursday
  style: detailed
  needs_image: true
  image_filename: Nightingale.jpeg
  posted: false
  posted_date: null
  discussion: true
  has_spoiler: false
  reactions:
  - 🌹
  - 🤯
  - 👩‍🔬
  - 📊
  - 💡
  reaction_labels:
    🌹: Already knew this
    🤯: Completely surprised
    👩‍🔬: More women in STEM history please
    📊: Now I want to make a Rose Diagram
    💡: This changed how I think about data
  body: |
    You know Florence Nightingale as the
    founder of modern nursing. That is true
    but deeply incomplete.

    She was primarily a brilliant mathematician
    and statistician who used data to save lives
    at a time when almost no one trusted data.

    During the Crimean War (1854-1856), she
    collected meticulous records on soldier
    deaths and discovered something shocking:
    - Deaths from battle wounds: relatively few
    - Deaths from preventable infections and
      poor sanitation: the vast majority

    But no one believed her words. So she
    invented an entirely new type of chart —
    the Polar Area Diagram, now called the
    Nightingale Rose Diagram — to make the
    data impossible to ignore.

    She presented it to British Parliament
    and Queen Victoria. The visualization was
    so compelling it directly led to sanitation
    reforms that saved hundreds of thousands
    of lives.

    She was one of the first people in history
    to use data visualization as a tool of
    persuasion and policy change.

    Today every research paper, every dashboard,
    every data presentation owes something to
    Florence Nightingale.

    💡 Next time someone says your research
    does not matter — remember her. 🌹
  footer: "GSA MathCafe · Powered by GSA Gateway"
- id: mc_008
  title: "The Unreachable Number"
  category: math
  subcategory: combinatorics
  day_preference: monday
  style: detailed
  needs_image: false
  image_filename: null
  posted: false
  posted_date: null
  discussion: true
  has_spoiler: true
  reactions:
  - 🎯
  - ❌
  - 🤔
  - 🧮
  - 💥
  reaction_labels:
    🎯: Got 31 correct!
    ❌: My answer was wrong
    🤔: Still working on it
    🧮: Found a different approach
    💥: This broke my brain
  body: |
    Using only the numbers 1, 2, 3 and the
    operators + − × ÷ ^ what is the smallest
    positive integer you CANNOT form?

    Rules:
    - Maximum 3 numbers total
    - Maximum 2 operators
    - Parentheses allowed
    - No concatenation (1 and 2 cannot make 12)
    - Numbers can repeat (2,2,3 is valid)

    Examples of what IS possible:
    ✅ 7  = 2³ − 1
    ✅ 13 = 3² + 2²
    ✅ 17 = 3² + 2³
    ✅ 22 = 3³ − 3 − 2
    ✅ 29 = 3³ + 2

    🤔 What is the first number you CANNOT reach?

    Post your answer in the thread and
    show your working for bonus respect! 👇
  spoiler_text: |
    **Answer: 31**

    Key building blocks available:
    3³ = 27, 2³ = 8, 3² = 9
    2^(3+2) = 32 ← overshoots by 1

    To make 31 you need 32 − 1 but
    2^(3+2) already uses all 3 numbers (2,3,2)
    leaving nothing for the −1.

    You also need 27 + 4 but the largest
    single number available is 3, giving
    only 27+3 = 30.

    No combination of three numbers from
    {1,2,3} with two operators reaches 31.

    31 stands alone. Unreachable. 🎯
  footer: "GSA MathCafe · Powered by GSA Gateway"
- id: mc_009
  title: "One Operator to Rule Them All"
  category: math
  subcategory: research
  day_preference: tuesday
  style: detailed
  needs_image: true
  image_filename: element.jpeg
  posted: false
  posted_date: null
  discussion: true
  has_spoiler: false
  reactions:
  - 🤯
  - 🔢
  - 🧪
  - 📄
  - 💡
  reaction_labels:
    🤯: Cannot believe this is true
    🔢: Already reading the paper
    🧪: Want to verify it myself
    📄: Share the paper link please
    💡: The NAND analogy clicked for me
  body: |
    From a recent paper that made mathematicians
    do a double take:

    Every elementary function you have ever used
    — sin, cos, tan, exp, log, powers, roots,
    hyperbolic functions, and even the constants
    π and e — can ALL be generated from just
    ONE binary operator and the number 1.

    That operator is:
    eml(x, y) = exp(x) − ln(y)

    Think about what this means:
    - sin(x)? Derivable from eml alone.
    - π? Derivable from eml alone.
    - x²? Derivable from eml alone.
    - The entire landscape of elementary
      mathematics — one operator.

    The CS analogy: NAND gates.
    A single logic gate from which every
    circuit, every processor, every computation
    can be built. Mathematics just found its
    NAND gate for elementary functions.

    Important note: this does not mean
    calculations become simpler. Composing
    eml many times to recover sin(x) is
    computationally expensive. But the
    theoretical result is profound — the
    entire zoo of elementary functions
    is one family with one common ancestor.

    🤔 What does this make you think about
    the deeper structure of mathematics?
  footer: "GSA MathCafe · Powered by GSA Gateway"
- id: mc_010
  title: "The Cookie Jar Problem"
  category: math
  subcategory: probability
  day_preference: monday
  style: detailed
  needs_image: true
  image_filename: cookies.jpeg
  posted: false
  posted_date: null
  discussion: true
  has_spoiler: true
  reactions:
  - 🍪
  - 🤯
  - ✅
  - 🧮
  - ❓
  reaction_labels:
    🍪: Got the right answer!
    🤯: Harmonic series — did not see that coming
    ✅: Different method, same answer
    🧮: Still working through the math
    ❓: What is a harmonic number?
  body: |
    A jar has 15 cookies. Each day you pick
    one cookie at random:

    If it is a WHOLE cookie:
      eat half, put the other half back

    If it is a HALF cookie:
      eat it entirely

    🤔 What is the EXPECTED number of half
    cookies in the jar at the moment you
    pick the very last whole cookie?

    Think carefully — this is trickier
    than it looks.

    Drop your answer in the discussion thread!
  spoiler_text: |
    **Answer: H(15) − 1 ≈ 2.38 half cookies**

    H(15) is the 15th Harmonic Number:
    H(15) = 1 + 1/2 + 1/3 + ... + 1/15 ≈ 3.38

    Solution uses linearity of expectation.

    For each of the first 14 whole cookies eaten,
    the half cookie it creates has probability
    1/(16−k) of surviving until the last whole
    is picked, where k is the order it was eaten.

    This is because among that half cookie and
    the (15−k) remaining whole cookies, the
    probability the half comes last is 1/(16−k).

    Summing over k = 1 to 14:
    E[H] = 1/15 + 1/14 + ... + 1/2
         = H(15) − 1 ≈ 2.38

    The harmonic series appears naturally here —
    the same series that governs coupon collecting,
    binary search, and quicksort analysis.
