- id: mc_013
  title: "Einstein Is Saving Your Navigation Right Now"
  category: science
  subcategory: physics / engineering
  day_preference: wednesday
  style: detailed
  needs_image: false
  image_filename: null
  posted: false
  posted_date: null
  discussion: true
  has_spoiler: false
  reactions:
  - 🛸
  - 🤯
  - 📡
  - 🧭
  - ✅
  reaction_labels:
    🛸: Relativity is everywhere
    🤯: Had no idea GPS used Einstein
    📡: I work with GPS systems
    🧭: Already knew this
    ✅: Now checking my GPS app differently
  body: |
    Every time you use GPS navigation,
    Einstein's equations run in the background.

    Here is why:

    GPS satellites carry incredibly precise
    atomic clocks. But relativity predicts
    two opposing effects on those clocks:

    Special Relativity effect:
    Satellites move at ~14,000 km/h relative
    to Earth. Moving clocks run SLOW.
    Effect: −7 microseconds per day.

    General Relativity effect:
    Satellites sit 20,000 km up where gravity
    is weaker. Weaker gravity means clocks
    run FAST.
    Effect: +45 microseconds per day.

    Net effect: satellite clocks gain
    +38 microseconds every single day.

    38 microseconds sounds tiny.
    But GPS uses the speed of light to
    calculate position.
    Light travels ~11km in 38 microseconds.

    Without relativistic correction:
    Your GPS would be wrong by 11km —
    and getting worse every day.

    Every Uber, every Google Maps route,
    every aircraft landing — Einstein's
    1905 and 1915 papers are doing the math.

    Pure theory. Completely practical. 🛸
  footer: "GSA MathCafe · Powered by GSA Gateway"
- id: mc_014
  title: "The Most Expensive Hyphen in History"
  category: cs
  subcategory: history / software engineering
  day_preference: friday
  style: detailed
  needs_image: false
  image_filename: null
  posted: false
  posted_date: null
  discussion: true
  has_spoiler: false
  reactions:
  - 😱
  - 💻
  - 📝
  - 🚀
  - 😬
  reaction_labels:
    😱: A hyphen caused this??
    💻: This is why we do code review
    📝: Documentation saves lives
    🚀: Space software is terrifying
    😬: I have never felt better about my bugs
  body: |
    In 1962, NASA lost the Mariner 1 spacecraft
    293 seconds after launch.

    The cause: a missing hyphen in the
    flight software code.

    The cost: $18.5 million.
    ($170 million in today's dollars)

    What happened:
    A handwritten formula specifying the
    guidance system was transcribed into code.
    One hyphen — indicating that a derivative
    should be used instead of raw radar data —
    was omitted during transcription.

    The result: the rocket began making wild
    course corrections based on noisy raw data
    instead of smoothed data. Mission Control
    had no choice but to destroy it.

    Arthur C. Clarke, author of 2001: A Space
    Odyssey, called it:
    "The most expensive hyphen in history."

    The software was correct on paper.
    The review process missed the transcription.
    The rocket never reached Venus.

    Lessons that still apply today:
    - Code review exists for a reason
    - Transcription errors are real errors
    - The difference between − and nothing
      is sometimes $170 million

    Next time someone rushes your code review —
    tell them about Mariner 1. 🚀
  footer: "GSA MathCafe · Powered by GSA Gateway"
- id: mc_015
  title: "The PhD That Built the Internet"
  category: cs
  subcategory: history / inspiration
  day_preference: friday
  style: detailed
  needs_image: false
  image_filename: null
  posted: false
  posted_date: null
  discussion: true
  has_spoiler: false
  reactions:
  - 🎓
  - 💡
  - 🚀
  - 🤯
  - 💻
  reaction_labels:
    🎓: My dissertation might matter too
    💡: Ideas rejected everywhere succeed elsewhere
    🚀: Motivation unlocked
    🤯: They tried to sell it for $750k??
    💻: PageRank is genuinely elegant math
  body: |
    In 1998, two Stanford PhD students could
    not get anyone to buy their side project.

    They approached Excite — the leading
    search engine at the time — and offered
    to sell for $1 million.
    Turned down.

    They offered again for $750,000.
    Turned down again.

    So Larry Page and Sergey Brin kept
    working on their PhD research project,
    which they had originally named BackRub.

    They renamed it Google.
    Incorporated in a garage on September 4, 1998.

    The core technology — PageRank — was
    literally Larry Page's PhD thesis.
    It modeled the web as a graph and ranked
    pages by the probability a random surfer
    would arrive there. Pure graph theory.
    Pure linear algebra.

    The academic insight was simple:
    a page is important if important pages
    link to it. Recursive, elegant, and
    worth approximately $2 trillion today.

    What Excite rejected:
    - A PhD thesis
    - Two grad students
    - $750,000

    What they passed on:
    - The most used website in human history

    Your dissertation might matter more
    than you think. 🎓
  footer: "GSA MathCafe · Powered by GSA Gateway"
