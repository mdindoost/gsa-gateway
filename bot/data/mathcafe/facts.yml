  reactions:
  - 🤔
  - ✅
  - ❓
  - 🧮
  - 💡
  reaction_labels:
    🤔: Still thinking
    ✅: I got it!
    ❓: Never seen this before
    🧮: Recognized it immediately
    💡: Learned something new
  body: "Look at this graph carefully before scrolling.\n\nWhat you can observe:\n\
    - Symmetric about the y-axis\n- Behaves like a parabola for large |x|\n- Something\
    \ very strange happens near x = 0\n- Oscillations become infinitely rapid\n  as\
    \ you approach the origin\n\n\U0001F914 What function produces this graph?\nDrop\
    \ your answer in the discussion thread!\n"
  spoiler_text: '**Answer: f(x) = x² · cos(1/x)**


    The x² term creates the parabolic envelope

    you see for large values. The cos(1/x) term

    oscillates infinitely fast as x approaches 0

    since 1/x → ∞.


    This is a classic calculus example because

    it is continuous everywhere including at x = 0

    (where we define f(0) = 0), yet oscillates

    infinitely many times near the origin.


    It is differentiable at x = 0 with f''(0) = 0,

    but behaves wildly at points arbitrarily close

    to 0. A beautiful mathematical monster. 🎭

    '
