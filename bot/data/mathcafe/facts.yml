  body: 'In 1998, two Stanford PhD students could

    not get anyone to buy their side project.


    They approached Excite — the leading

    search engine at the time — and offered

    to sell for $1 million.

    Turned down.


    They offered again for $750,000.

    Turned down again.


    So Larry Page and Sergey Brin kept

    working on their PhD research project,

    which they had originally named BackRub.


    They renamed it Google.

    Incorporated in a garage on September 4, 1998.


    The core technology — PageRank — was

    literally Larry Page''s PhD thesis.

    It modeled the web as a graph and ranked

    pages by the probability a random surfer

    would arrive there. Pure graph theory.

    Pure linear algebra.


    The academic insight was simple:

    a page is important if important pages

    link to it. Recursive, elegant, and

    worth approximately $2 trillion today.


    What Excite rejected:

    - A PhD thesis

    - Two grad students

    - $750,000


    What they passed on:

    - The most used website in human history


    Your dissertation might matter more

    than you think. 🎓

    '
