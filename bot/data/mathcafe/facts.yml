    title: Happy Birthday, Maryam Mirzakhani 🌸
    category: history
    subcategory: inspiration
    needs_image: true
    image_filename: Maryam.png
    discussion: true
    has_spoiler: false
    last_posted_year: null
    reactions:
    - 🌸
