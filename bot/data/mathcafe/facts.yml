- id: mc_003
  title: "Can You Identify This Function?"
  category: math
  subcategory: calculus
  day_preference: monday
  style: detailed
  needs_image: true
  image_filename: function.jpeg
  posted: false
  posted_date: null
  discussion: true
  has_spoiler: true
  reactions:
  - 🤔
  - ✅
  - ❓
  - 🧮
  - 💡
  reaction_labels:
    🤔: Still thinking
    ✅: I got it!
    ❓: Never seen this before
    🧮: Recognized it immediately
    💡: Learned something new
  body: |
    Look at this graph carefully before scrolling.

    What you can observe:
    - Symmetric about the y-axis
    - Behaves like a parabola for large |x|
    - Something very strange happens near x = 0
    - Oscillations become infinitely rapid
      as you approach the origin

    🤔 What function produces this graph?
    Drop your answer in the discussion thread!
  spoiler_text: |
    **Answer: f(x) = x² · cos(1/x)**

    The x² term creates the parabolic envelope
    you see for large values. The cos(1/x) term
    oscillates infinitely fast as x approaches 0
    since 1/x → ∞.

    This is a classic calculus example because
    it is continuous everywhere including at x = 0
    (where we define f(0) = 0), yet oscillates
    infinitely many times near the origin.

    It is differentiable at x = 0 with f'(0) = 0,
    but behaves wildly at points arbitrarily close
    to 0. A beautiful mathematical monster. 🎭
