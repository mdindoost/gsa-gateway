  reaction_labels:
    🌀: Got it immediately
    🤯: Mind blown
    📚: Had to look it up
    ❓: Still confused
    🔢: Fibonacci fan
  body: 'Each colored rectangle represents a day

    of the week. The sizes are not random.


    🤔 What mathematical pattern connects

    the size of each day?


    Drop your answer in the discussion thread!

    '
  spoiler_text: '**Answer: The Fibonacci Sequence**


    The side lengths follow: 1, 1, 2, 3, 5, 8, 13

    where each number = sum of the two before it.


    Sunday=1, Saturday=1, Friday=2, Thursday=3,

    Wednesday=5, Tuesday=8, Monday=13


    Connecting the corners creates the Golden Spiral

    — found in nautilus shells, sunflower seeds,

    galaxies, hurricanes, and the Parthenon.


    The ratio of consecutive Fibonacci numbers

    approaches φ = 1.6180339...

    the Golden Ratio — arguably the most beautiful

    number in mathematics.


    A whole week. An infinite mathematical truth. 🌀

    '
